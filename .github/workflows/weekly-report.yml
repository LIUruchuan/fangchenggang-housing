name: 🏠 防城港房价周报

on:
  schedule:
    # 每周六 12:00 北京时间 = UTC 04:00
    - cron: '0 4 * * 6'
  workflow_dispatch:
    inputs:
      skip_notify:
        description: '跳过 Server酱 通知'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python scripts/scrape_housing.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reports/
          if git diff --staged --quiet; then
            echo "No new data, skip commit."
          else
            git commit -m "🏠 Weekly update: $(date +'%Y-%m-%d') housing data"
            git pull --rebase --autostash
            git push
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './reports'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Server酱通知
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_notify != 'true' }}
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: |
          if [ -z "$SERVERCHAN_SENDKEY" ]; then
            echo "No SERVERCHAN_SENDKEY, skip notify."
            exit 0
          fi
          DATE=$(date +'%Y-%m-%d')
          DESP=$(python3 -c 'import json; d=json.load(open("data/summary.json")); print(d.get("notify_html","<p>no data</p>"))')
          curl -s -X POST "https://sctapi.ftqq.com/$SERVERCHAN_SENDKEY.send" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"锦泰现代城房价 (${DATE})\",\"desp\":\"${DESP}\"}"
          echo "Server酱 通知已发送"
